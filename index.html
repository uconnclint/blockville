<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏗️%3C/text%3E%3C/svg%3E">
<title>Blockville — Build Your Voxel City!</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#87d4f5;
    font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:none; }
  #game { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #boot { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(#7cc9f0,#b8e6ff); z-index:99; transition:opacity .5s; }
  #boot h1 { font-size:min(12vw,64px); color:#fff; text-shadow:0 4px 0 rgba(30,90,140,.35); margin:0; letter-spacing:1px; }
  #boot p { color:#2b6a99; font-size:20px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="boot"><h1>🏗️ Blockville</h1><p>Loading your city…</p></div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
